name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/pint --test

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/phpstan analyse --no-progress

  tests:
    name: Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, sqlite3, pdo_sqlite
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/pest --ci

  release:
    name: Tag & release
    needs: [lint, static-analysis, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%B)"

          # Escape hatch: skip releasing for this push.
          if echo "$msg" | grep -qiE '\[skip release\]|#norelease'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)"
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"

          # Default patch bump; commit message can request minor/major.
          if echo "$msg" | grep -qiE '#major'; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$msg" | grep -qiE '#minor'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Create tag & release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest
